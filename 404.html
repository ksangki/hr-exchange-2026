<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Exchange 2026</title>
</head>
<body>
    <p>Redirecting...</p>
    <script>
        var basePath = '/hr-exchange-2026';
        var path = window.location.pathname;
        var hash = window.location.hash;
        
        var target = basePath;
        if (path && path !== basePath) {
            target = path;
        }
        if (hash && hash !== '#') {
            target = target + hash;
        } else {
            target = target + '/';
        }
        
        window.location.replace(target);
    </script>
</body>
</html>
