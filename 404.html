<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Exchange 2026</title>
    <script>
        (function() {
            var basePath = '/hr-exchange-2026';
            var path = window.location.pathname;
            
            var remaining = path.replace(basePath, '');
            var hashPath = remaining.replace(/^\//, '').replace(/\/$/, '');
            
            if (hashPath) {
                window.location.replace(basePath + '/#/' + hashPath);
            } else {
                window.location.replace(basePath + '/#/');
            }
        })();
    </script>
</head>
<body>
    <p>Redirecting...</p>
    <p>If not redirected, <a href="/hr-exchange-2026/">click here to go home</a>.</p>
</body>
</html>
